# Custom rules use LOW/MEDIUM/HIGH/CRITICAL severity labels. Reserve Semgrep's
# legacy ERROR label for upstream default rules; the CI gate maps ERROR to HIGH.
rules:
  - id: fastapi-record-read-without-owner-check
    languages: [python]
    severity: CRITICAL
    message: >
      FastAPI route performs authorization-sensitive data access or outbound
      action without first scoping the call to current_user or checking role or
      ownership. Authorize the request before returning record data or making
      privileged calls.
    metadata:
      category: security
      confidence: HIGH
      impact: CRITICAL
      likelihood: HIGH
      cwe:
        - "CWE-639: Authorization Bypass Through User-Controlled Key"
      technology:
        - fastapi
      references:
        - https://cwe.mitre.org/data/definitions/639.html
    patterns:
      - pattern-inside: |
          @$ROUTER.$METHOD(...)
          def $HANDLER(...):
              ...
      - pattern-either:
          - pattern-inside: |
              def $HANDLER(..., current_user: $TYPE, ...):
                  ...
          - pattern-inside: |
              def $HANDLER(..., current_user = Depends(get_current_user), ...):
                  ...
      - pattern-either:
          - pattern: db.$FUNC(...)
          - pattern: requests.$FUNC(...)
      - metavariable-regex:
          metavariable: $METHOD
          regex: ^(get|post|put|patch|delete)$
      - pattern-not: db.$FUNC(..., current_user.id, ...)
      - pattern-not: db.$FUNC(current_user.id)
      - pattern-not: |
          $RECORD = db.$FUNC(...)
          ...
          if current_user.role != "staff" and $RECORD["owner_user_id"] != current_user.id:
              ...
      - pattern-not: |
          $RECORD = db.$FUNC(...)
          ...
          if $RECORD["owner_user_id"] != current_user.id and current_user.role != "staff":
              ...
      - pattern-not-inside: |
          if current_user.role != $ROLE:
              ...
          ...
      - pattern-not-inside: |
          if current_user.role == $ROLE:
              ...
          ...

  - id: sqlite-query-built-with-f-string
    languages: [python]
    severity: HIGH
    message: >
      SQL query is built with Python string interpolation before execution.
      Use parameterized queries so user-controlled input cannot alter SQL.
    metadata:
      category: security
      confidence: HIGH
      impact: MEDIUM
      likelihood: HIGH
      cwe:
        - "CWE-89: Improper Neutralization of Special Elements used in an SQL Command"
      technology:
        - sqlite
      references:
        - https://cwe.mitre.org/data/definitions/89.html
    pattern-either:
      - pattern: |
          $QUERY = f"..."
          ...
          $CONNECTION.execute($QUERY)
      - pattern: |
          $CONNECTION.execute(f"...")

  - id: jwt-hs256-best-practices
    languages: [python]
    severity: WARNING
    message: >
      JWT signing is configured with HS256. HS256 uses HMAC-SHA256 and is not
      inherently weak, but prefer SHA-256-backed asymmetric JWT signing such as
      RS256, PS256, or ES256 when key separation or third-party verification is
      needed. If HS256 is required, use a 256-bit or stronger random secret from
      a secret manager, rotate it, never commit it, restrict accepted algorithms,
      and validate exp, iss, and aud claims.
    metadata:
      category: security
      confidence: HIGH
      impact: MEDIUM
      likelihood: MEDIUM
      cwe:
        - "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"
      technology:
        - jwt
        - pyjwt
      references:
        - https://pyjwt.readthedocs.io/en/stable/algorithms.html
        - https://datatracker.ietf.org/doc/html/rfc8725
    pattern-regex: (?m)^\s*(?:JWT_)?[A-Za-z_]*ALG(?:ORITHM)?[A-Za-z_]*\s*=\s*["']HS256["']

  - id: hardcoded-api-key-or-secret-in-test
    languages: [python]
    severity: MEDIUM
    message: >
      Hardcoded API key, token, password, credential, or secret-like value found.
      Store secrets in a secret manager or environment variable, rotate any value
      that may have been exposed, and keep test fixtures clearly isolated from
      runtime configuration.
    metadata:
      category: security
      confidence: HIGH
      impact: MEDIUM
      likelihood: HIGH
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
      technology:
        - secrets
      references:
        - https://cwe.mitre.org/data/definitions/798.html
    pattern-regex: (?im)^\s*[A-Za-z_][A-Za-z0-9_]*(?:API[_-]?KEY|SECRET|TOKEN|PASSWORD|CREDENTIAL|PRIVATE[_-]?KEY)[A-Za-z0-9_]*\s*=\s*["'][^"']{8,}["']

  - id: test-hardcoded-user-login-credentials
    languages: [python]
    severity: MEDIUM
    message: >
      Test code uses hardcoded user login credentials. Confirm these are not
      actual production users and are only isolated test users, or generate
      dedicated test users and passwords during test runtime instead of storing
      reusable credentials in source.
    metadata:
      category: security
      confidence: HIGH
      impact: MEDIUM
      likelihood: MEDIUM
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
      technology:
        - tests
        - authentication
      references:
        - https://cwe.mitre.org/data/definitions/798.html
    paths:
      include:
        - /tests/**/*.py
        - "**/test_*.py"
        - "**/*_test.py"
    pattern-either:
      - pattern: |
          login("...", "...")
      - pattern: |
          $CLIENT.post("/api/login", json={"email": "...", "password": "..."})
      - pattern: |
          $CLIENT.post("/api/login", json={"username": "...", "password": "..."})
