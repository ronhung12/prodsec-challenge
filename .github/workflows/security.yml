name: security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI_ENV_FILE: .github/env/ci.env

jobs:
  unit-tests:
    name: Test / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Load CI environment
        run: cat "$CI_ENV_FILE" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m compileall app tests

      - name: Run unit tests
        run: python -m unittest discover -s tests

  semgrep:
    name: Test / Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate Semgrep SARIF
        continue-on-error: true
        run: |
          docker run --rm \
            --env-file .github/env/semgrep.env \
            -v "${PWD}:/src" \
            -w /src \
            semgrep/semgrep \
            semgrep scan \
              --config p/default \
              --config .semgrep.yml \
              --sarif \
              --output semgrep.sarif

      - name: Generate Semgrep JSON
        continue-on-error: true
        run: |
          docker run --rm \
            --env-file .github/env/semgrep.env \
            -v "${PWD}:/src" \
            -w /src \
            semgrep/semgrep \
            semgrep scan \
              --config p/default \
              --config .semgrep.yml \
              --json \
              --output semgrep.json

      - name: Upload Semgrep result artifacts
        if: ${{ always() && (hashFiles('semgrep.sarif') != '' || hashFiles('semgrep.json') != '') }}
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: |
            semgrep.sarif
            semgrep.json
          if-no-files-found: ignore

      - name: Upload Semgrep results to code scanning
        if: ${{ always() && hashFiles('semgrep.sarif') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif

      - name: Enforce Semgrep severity and confidence gate
        run: |
          python3 - <<'PY'
          import json
          import sys
          from pathlib import Path

          results_path = Path("semgrep.json")
          if not results_path.exists():
              print("Semgrep JSON results were not generated; cannot enforce the confidence gate.")
              sys.exit(1)

          report = json.loads(results_path.read_text(encoding="utf-8"))
          findings = report.get("results", [])
          # Custom rules use HIGH/CRITICAL for high-or-above findings. Older
          # Semgrep default rules can still report ERROR for high-severity
          # findings, so keep ERROR in the blocking set as a legacy alias.
          severity_rank = {
              "INFO": 0,
              "LOW": 1,
              "WARNING": 1,
              "MEDIUM": 2,
              "HIGH": 3,
              "ERROR": 3,
              "CRITICAL": 4,
          }

          def confidence(finding):
              return str(
                  finding.get("extra", {})
                  .get("metadata", {})
                  .get("confidence", "")
              ).upper()

          def severity(finding):
              return str(finding.get("extra", {}).get("severity", "")).upper()

          def is_high_or_above(finding):
              return severity_rank.get(severity(finding), -1) >= severity_rank["HIGH"]

          blocking_findings = [
              finding
              for finding in findings
              if confidence(finding) == "HIGH" and is_high_or_above(finding)
          ]

          if not blocking_findings:
              print(
                  "No HIGH/CRITICAL or legacy ERROR Semgrep findings "
                  "with high confidence found."
              )
              sys.exit(0)

          print(
              f"Found {len(blocking_findings)} HIGH/CRITICAL or legacy ERROR "
              "Semgrep finding(s) with high confidence:"
          )
          for finding in blocking_findings:
              rule = finding.get("check_id", "unknown-rule")
              path = finding.get("path", "unknown-path")
              line = finding.get("start", {}).get("line", 1)
              severity = finding.get("extra", {}).get("severity", "UNKNOWN")
              confidence = (
                  finding.get("extra", {})
                  .get("metadata", {})
                  .get("confidence", "UNKNOWN")
              )
              message = finding.get("extra", {}).get("message", "").replace("\n", " ")
              print(f"- {severity} confidence={confidence} {path}:{line} {rule}: {message}")
              escaped_message = message.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
              print(
                  f"::error file={path},line={line},title=High-confidence high-severity Semgrep finding::{rule}: {escaped_message}"
              )

          sys.exit(1)
          PY

  package:
    name: Package / Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [unit-tests, semgrep]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build image
        run: docker build --tag records-api:${{ github.sha }} .

      - name: Inspect image
        run: docker image inspect records-api:${{ github.sha }}
